name: Deploy static content to Pages

on:
  workflow_dispatch:
  push:
    branches: ['main']
  schedule:
    # Daily rebuild so booked.ics picks up new Airbnb reservations
    - cron: '15 4 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build  # Ensure this runs successfully
      - name: Fetch Airbnb availability
        # -f fails the deploy if Airbnb errors, keeping the previous deployment
        # (with its older booked.ics) live rather than shipping an empty calendar
        run: curl -sf 'https://www.airbnb.com/calendar/ical/1221766328608212785.ics?s=4d2dd1dfb1a415240779bbded1cfe075&locale=en-GB' -o ./dist/booked.ics
      - name: Disable Jekyll for GitHub Pages
        run: echo "" > ./dist/.nojekyll
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
